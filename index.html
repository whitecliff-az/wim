<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Сводка по банковским отчётам принципалов · 2026</title>
<style>
  :root {
    --navy-900: #0a1f3d;
    --navy-800: #12294f;
    --navy-700: #1c3766;
    --navy-500: #2f4d82;
    --navy-300: #6b84ac;
    --blue-100: #eef1f7;
    --blue-50: #f6f8fb;
    --border: #dde2eb;
    --text: #1a2436;
    --text-muted: #6b7280;
    --green: #4a8a6a;
    --green-bg: #eaf3ee;
    --red: #b0655c;
    --red-bg: #f7ece9;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { min-width: 1200px; }

  body {
    font-family: 'Arial Nova', Arial, sans-serif;
    background: var(--blue-50);
    color: var(--text);
    min-height: 100vh;
    min-width: 1200px;
  }

  /* HEADER */
  .header {
    background: var(--navy-900);
    padding: 28px 40px 22px;
  }
  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    max-width: 1200px;
    margin: 0 auto;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.01em;
  }
  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .header-date {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }

  /* TABS LEVEL 1 */
  .tabs-l1 {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
  }
  .tab-l1 {
    padding: 15px 26px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .tab-l1:hover { color: var(--navy-800); }
  .tab-l1.active { color: var(--navy-900); border-bottom-color: var(--navy-900); }

  /* TABS LEVEL 2 */
  .tabs-l2-wrap {
    background: var(--blue-100);
    border-bottom: 1px solid var(--border);
  }
  .tabs-l2 {
    padding: 0 40px;
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
  }
  .tab-l2 {
    padding: 11px 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--navy-500);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .tab-l2:hover { color: var(--navy-900); }
  .tab-l2.active { color: var(--navy-900); border-bottom-color: var(--navy-700); background: var(--white); }

  /* CONTENT */
  .content {
    padding: 28px 40px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .principal-panel { display: none; }
  .principal-panel.active { display: block; }

  /* OPENING BALANCE */
  .opening-row {
    background: var(--navy-900);
    color: var(--white);
    border-radius: 6px;
    padding: 14px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .opening-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .opening-value {
    font-size: 18px;
    font-weight: 700;
  }

  /* SUMMARY CARDS */
  .summary-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1.3fr;
    gap: 14px;
    margin-bottom: 18px;
  }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 20px;
  }
  .card-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .card-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy-900);
    letter-spacing: -0.02em;
  }
  .card-value.positive { color: var(--green); }
  .card-value.negative { color: var(--red); }
  .card-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* GENERIC "COMPOSITION BAR" STYLE — used for currency split AND type breakdowns */
  .comp-bars {
    margin-top: 9px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .comp-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .comp-label {
    width: 150px;
    flex-shrink: 0;
    color: var(--text-muted);
    font-size: 11.5px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .comp-label.short {
    width: 32px;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }
  .bar-track {
    flex: 1;
    height: 6px;
    background: var(--blue-100);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 4px; }
  .bar-fill.aed { background: var(--navy-700); }
  .bar-fill.usd { background: var(--navy-300); }
  .bar-fill.inc { background: var(--green); }
  .bar-fill.out { background: var(--red); }
  .comp-amount {
    width: 110px;
    flex-shrink: 0;
    text-align: right;
    font-size: 12px;
    font-weight: 700;
  }
  .comp-amount.inc { color: var(--green); }
  .comp-amount.out { color: var(--red); }

  .type-row {
    grid-column: span 2;
  }

  /* TYPE BREAKDOWN ROW — two cards side by side */
  .types-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 18px;
  }

  /* COLLAPSIBLE PANELS (operations) */
  .box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .box-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .box-title-row { display: flex; align-items: center; gap: 10px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-navy { background: var(--navy-500); }
  .box-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .box-total { font-size: 14px; font-weight: 700; }
  .box-total.green { color: var(--green); }
  .box-total.red { color: var(--red); }
  .chevron { font-size: 11px; color: var(--navy-300); transition: transform 0.2s; margin-left: 12px; }
  .chevron.open { transform: rotate(180deg); }

  .list-body { display: none; }
  .list-body.open { display: block; }

  .row-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--blue-50);
  }
  .row-item:last-child { border-bottom: none; }
  .row-item:hover { background: var(--blue-50); }
  .row-date {
    font-size: 11px;
    color: var(--text-muted);
    min-width: 68px;
    font-variant-numeric: tabular-nums;
  }
  .row-desc { flex: 1; font-size: 13px; color: var(--text); }
  .row-cp { font-weight: 600; color: var(--text); }
  .row-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    margin-left: 8px;
    background: var(--blue-100);
    color: var(--navy-700);
  }
  .row-amount { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .row-amount.inc { color: var(--green); }
  .row-amount.out { color: var(--red); }

  /* SVOD TABLE */
  .svod-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--white);
  }
  .svod-table th {
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--blue-50);
  }
  .svod-table th.num, .svod-table td.num { text-align: right; }
  .svod-table td {
    padding: 12px 20px;
    font-size: 13px;
    border-bottom: 1px solid var(--blue-50);
  }
  .svod-table tr:last-child td { border-bottom: none; }
  .svod-table tr.total-row td {
    font-weight: 700;
    background: var(--blue-50);
    border-top: 1px solid var(--border);
  }
  .bank-name { font-weight: 600; color: var(--navy-900); }
  .num.inc { color: var(--green); font-weight: 600; }
  .num.out { color: var(--red); font-weight: 600; }

  .footer {
    text-align: center;
    padding: 28px 40px 24px;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Сводка по банковским отчётам принципалов за 2026 год</div>
      <div class="header-sub">Whitecliff Group · Конфиденциально</div>
    </div>
    <div class="header-date" id="currentDate"></div>
  </div>
</div>

<div class="tabs-l1" id="tabsL1"></div>
<div class="content" id="content"></div>
<div class="footer">Данные на <span id="footerDate"></span> · внутренний документ, не для внешнего распространения</div>

<script>
/* ---------- ДАННЫЕ ---------- */

const currencySplit = { aed: 0.4, usd: 0.6 };

// Единый шаблон операций по банку (используется одинаково для примера по всем банкам и принципалам)
// Терминология: тип операции — юридически/финансово нейтральный термин, контрагент — сторона расчёта
function bankTemplate() {
  return {
    opening: 999987,
    income: [
      { date: '12.03.2026', counterparty: 'Компания 1', type: 'Заём', amount: 50000000 },
      { date: null,         counterparty: '',           type: 'Проценты по депозиту', amount: 375 }
    ],
    expense: [
      { date: '02.04.2026', counterparty: 'София',      type: 'Подарок', amount: 8000000 },
      { date: '12.05.2026', counterparty: 'ENBD SG',    type: 'Перевод между собственными счетами', amount: 10000000 },
      { date: '13.05.2026', counterparty: 'Компания 2', type: 'Приобретение недвижимости', amount: 3062000 },
      { date: '25.05.2026', counterparty: 'Компания 3', type: 'Приобретение услуг', amount: 8058 },
      { date: '05.06.2026', counterparty: 'Компания 2', type: 'Приобретение недвижимости', amount: 27870000 },
      { date: null,         counterparty: '',           type: 'Банковские расходы', amount: 292 }
    ]
  };
}

const banks = ['ENBD', 'Frick', 'RBK'];
const principals = ['ЭВО', 'ОНН', 'ВСК'];

const data = {};
principals.forEach(p => {
  data[p] = {};
  banks.forEach(b => { data[p][b] = bankTemplate(); });
});

/* ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---------- */

function fmt(n) { return n.toLocaleString('ru-RU'); }
function sum(arr) { return arr.reduce((s, x) => s + x.amount, 0); }

function computeBank(b) {
  const inc = sum(b.income);
  const out = sum(b.expense);
  const balance = b.opening + inc - out;
  return { inc, out, balance };
}

function groupByType(items) {
  const map = {};
  items.forEach(i => {
    if (!map[i.type]) map[i.type] = { type: i.type, amount: 0 };
    map[i.type].amount += i.amount;
  });
  return Object.values(map).sort((a, b) => b.amount - a.amount);
}

let uid = 0;
function nextId() { return 'id' + (uid++); }

/* ---------- РЕНДЕР ---------- */

function renderCurrencyCard(balance) {
  const aed = Math.round(balance * currencySplit.aed);
  const usd = balance - aed;
  return `
    <div class="card">
      <div class="card-label">Состав остатка по валютам</div>
      <div class="comp-bars">
        <div class="comp-row">
          <div class="comp-label short">AED</div>
          <div class="bar-track"><div class="bar-fill aed" style="width:${currencySplit.aed*100}%"></div></div>
          <div class="comp-amount">${fmt(aed)}</div>
        </div>
        <div class="comp-row">
          <div class="comp-label short">USD</div>
          <div class="bar-track"><div class="bar-fill usd" style="width:${currencySplit.usd*100}%"></div></div>
          <div class="comp-amount">${fmt(usd)}</div>
        </div>
      </div>
    </div>`;
}

function renderTypeCard(title, items, cls) {
  const grouped = groupByType(items);
  const max = Math.max(...grouped.map(g => g.amount));
  const rows = grouped.map(g => `
    <div class="comp-row">
      <div class="comp-label">${g.type}</div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${(g.amount/max*100).toFixed(0)}%"></div></div>
      <div class="comp-amount ${cls}">${cls==='inc'?'+':'−'}${fmt(g.amount)}</div>
    </div>`).join('');
  return `
    <div class="card">
      <div class="card-label">${title}</div>
      <div class="comp-bars">${rows}</div>
    </div>`;
}

function renderTxBox(title, items, cls, total) {
  const boxId = nextId();
  const rows = items.map(i => {
    const main = i.counterparty ? `<span class="row-cp">${i.counterparty}</span>` : `<span class="row-cp">${i.type}</span>`;
    const tag = i.counterparty ? `<span class="row-tag">${i.type}</span>` : '';
    return `
    <div class="row-item">
      <div class="row-date">${i.date || '—'}</div>
      <div class="row-desc">${main}${tag}</div>
      <div class="row-amount ${cls}">${cls==='inc'?'+':'−'}${fmt(i.amount)}</div>
    </div>`;
  }).join('');
  return `
    <div class="box">
      <div class="box-header" onclick="toggle('${boxId}')">
        <div class="box-title-row"><div class="dot dot-${cls==='inc'?'green':'red'}"></div><div class="box-title">${title} — операции</div></div>
        <div style="display:flex;align-items:center">
          <div class="box-total ${cls==='inc'?'green':'red'}">${cls==='inc'?'+':'−'}${fmt(total)}</div>
          <div class="chevron open" id="chev-${boxId}">▾</div>
        </div>
      </div>
      <div class="list-body open" id="${boxId}">${rows}</div>
    </div>`;
}

function renderBankPanel(p, b) {
  const bd = data[p][b];
  const { inc, out, balance } = computeBank(bd);
  return `
    <div class="opening-row">
      <div class="opening-label">Остаток на 01.01.2026 — ${b}</div>
      <div class="opening-value">${fmt(bd.opening)}</div>
    </div>
    <div class="summary-row">
      <div class="card">
        <div class="card-label">Поступления 2026</div>
        <div class="card-value positive">+${fmt(inc)}</div>
        <div class="card-sub">${bd.income.length} операции</div>
      </div>
      <div class="card">
        <div class="card-label">Выбытия 2026</div>
        <div class="card-value negative">−${fmt(out)}</div>
        <div class="card-sub">${bd.expense.length} операций</div>
      </div>
      <div class="card">
        <div class="card-label">Текущий остаток</div>
        <div class="card-value">${fmt(balance)}</div>
        <div class="card-sub">актуально сегодня</div>
      </div>
      ${renderCurrencyCard(balance)}
    </div>
    <div class="types-row">
      ${renderTypeCard('Поступления по типам', bd.income, 'inc')}
      ${renderTypeCard('Выбытия по типам', bd.expense, 'out')}
    </div>
    ${renderTxBox('Поступления', bd.income, 'inc', inc)}
    ${renderTxBox('Выбытия', bd.expense, 'out', out)}
  `;
}

function renderSvodPanel(p) {
  let totalOpen = 0, totalInc = 0, totalOut = 0, totalBal = 0;
  const rows = banks.map(b => {
    const bd = data[p][b];
    const { inc, out, balance } = computeBank(bd);
    totalOpen += bd.opening; totalInc += inc; totalOut += out; totalBal += balance;
    return `
      <tr>
        <td class="bank-name">${b}</td>
        <td class="num">${fmt(bd.opening)}</td>
        <td class="num inc">+${fmt(inc)}</td>
        <td class="num out">−${fmt(out)}</td>
        <td class="num">${fmt(balance)}</td>
      </tr>`;
  }).join('');

  const allIncome = banks.flatMap(b => data[p][b].income);
  const allExpense = banks.flatMap(b => data[p][b].expense);

  return `
    <div class="opening-row">
      <div class="opening-label">Совокупный остаток на 01.01.2026 — все банки</div>
      <div class="opening-value">${fmt(totalOpen)}</div>
    </div>
    <div class="summary-row">
      <div class="card">
        <div class="card-label">Поступления 2026, всего</div>
        <div class="card-value positive">+${fmt(totalInc)}</div>
        <div class="card-sub">${banks.length} банка</div>
      </div>
      <div class="card">
        <div class="card-label">Выбытия 2026, всего</div>
        <div class="card-value negative">−${fmt(totalOut)}</div>
        <div class="card-sub">${banks.length} банка</div>
      </div>
      <div class="card">
        <div class="card-label">Текущий остаток, всего</div>
        <div class="card-value">${fmt(totalBal)}</div>
        <div class="card-sub">по всем банкам</div>
      </div>
      ${renderCurrencyCard(totalBal)}
    </div>

    <div class="box">
      <div class="box-header" style="cursor:default">
        <div class="box-title-row"><div class="dot dot-navy"></div><div class="box-title">Остатки по банкам</div></div>
      </div>
      <table class="svod-table">
        <thead>
          <tr>
            <th>Банк</th>
            <th class="num">Остаток на 01.01</th>
            <th class="num">Поступления</th>
            <th class="num">Выбытия</th>
            <th class="num">Текущий остаток</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
          <tr class="total-row">
            <td>Итого</td>
            <td class="num">${fmt(totalOpen)}</td>
            <td class="num inc">+${fmt(totalInc)}</td>
            <td class="num out">−${fmt(totalOut)}</td>
            <td class="num">${fmt(totalBal)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="types-row">
      ${renderTypeCard('Поступления по типам — все банки', allIncome, 'inc')}
      ${renderTypeCard('Выбытия по типам — все банки', allExpense, 'out')}
    </div>
  `;
}

function toggle(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

/* ---------- ПОСТРОЕНИЕ СТРАНИЦЫ ---------- */

function build() {
  const tabsL1 = document.getElementById('tabsL1');
  const content = document.getElementById('content');

  principals.forEach((p, pi) => {
    const tab = document.createElement('div');
    tab.className = 'tab-l1' + (pi === 0 ? ' active' : '');
    tab.textContent = p;
    tab.onclick = () => switchPrincipal(p);
    tabsL1.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'principal-panel' + (pi === 0 ? ' active' : '');
    panel.id = 'principal-' + p;

    const l2wrap = document.createElement('div');
    l2wrap.className = 'tabs-l2-wrap';
    const l2 = document.createElement('div');
    l2.className = 'tabs-l2';

    const views = ['Свод', ...banks];
    views.forEach((v, vi) => {
      const t2 = document.createElement('div');
      t2.className = 'tab-l2' + (vi === 0 ? ' active' : '');
      t2.textContent = v === 'Свод' ? 'Свод по банкам' : v;
      t2.onclick = () => switchBank(p, v, t2);
      l2.appendChild(t2);
    });
    l2wrap.appendChild(l2);
    panel.appendChild(l2wrap);

    const bankContent = document.createElement('div');
    bankContent.style.padding = '24px 40px';
    bankContent.style.maxWidth = '1200px';
    bankContent.style.margin = '0 auto';
    bankContent.id = 'bankContent-' + p;
    bankContent.innerHTML = renderSvodPanel(p);
    panel.appendChild(bankContent);

    content.appendChild(panel);
  });
}

function switchPrincipal(p) {
  document.querySelectorAll('.tab-l1').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.principal-panel').forEach(pn => pn.classList.remove('active'));
  [...document.getElementById('tabsL1').children].forEach(t => {
    if (t.textContent === p) t.classList.add('active');
  });
  document.getElementById('principal-' + p).classList.add('active');
}

function switchBank(p, view, el) {
  const panel = document.getElementById('principal-' + p);
  panel.querySelectorAll('.tab-l2').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const bankContent = document.getElementById('bankContent-' + p);
  bankContent.innerHTML = view === 'Свод' ? renderSvodPanel(p) : renderBankPanel(p, view);
}

build();

const now = new Date();
const dateStr = now.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
document.getElementById('currentDate').textContent = dateStr;
document.getElementById('footerDate').textContent = dateStr;
</script>
